<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業排版編輯器 - 2x2 智慧無縫識別證批量系統</title>
    <style>
        :root {
            --primary: #7d8f76; /* 鼠尾草綠 Sage Green */
            --primary-hover: #677860;
            --success: #8fa89b; /* 草木綠 Herbal Green */
            --success-hover: #7b9487;
            --warning: #d48c70; /* 暖泥陶土橘 Terracotta */
            --warning-hover: #c1785c;
            --danger: #db7c75; /* 珊瑚粉 Dusty Coral */
            --danger-hover: #c5655d;
            --bg-light: #faf8f5; /* 燕麥白 Oatmeal Cream */
            --panel-bg: #ffffff; /* 純淨暖白 */
            --border-light: #e6dfd5; /* 溫和暖灰線條 */
            --border-hover: #cbd5e1;
            --text-main: #3d423e; /* 暖炭黑 Warm Charcoal */
            --text-sub: #8a928c; /* 霧霾灰綠 Muted Grey-green */
            --badge-bg: #f3eee7; /* 燕麥米色 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(#e5dfd3 1px, transparent 1px);
            background-size: 20px 20px;
            user-select: none;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* 頂部引導控制面板 */
        #control-panel {
            background-color: var(--panel-bg);
            padding: 24px;
            box-shadow: 0 4px 15px rgba(142, 136, 122, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 步驟式網格布局 */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .step-card {
            background: #fdfdfd;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 16px;
            position: relative;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .step-card:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(125, 143, 118, 0.08);
        }
        .step-card.completed {
            border-color: var(--success);
            background-color: rgba(143, 168, 155, 0.04);
        }
        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-main);
            letter-spacing: 0.3px;
        }
        .step-badge {
            background: var(--badge-bg);
            color: var(--text-main);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid var(--border-light);
        }
        .step-card.completed .step-badge {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        .step-status {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
        }
        .step-card.completed .step-status {
            color: var(--success);
        }

        /* 輸入與上傳按鍵樣式 */
        .step-card input[type="text"], 
        .step-card input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            background: #fcfbfa;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-main);
            box-sizing: border-box;
            margin-top: 5px;
            transition: all 0.2s ease;
        }
        .step-card input[type="text"]:focus, 
        .step-card input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
        }
        .file-upload-label {
            display: block;
            background: #faf8f5;
            border: 1px dashed var(--border-light);
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: 700;
            color: var(--text-sub);
            transition: all 0.2s ease;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-upload-label:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(125, 143, 118, 0.05);
        }
        .thumbnail-preview {
            width: 50px;
            height: 35px;
            object-fit: contain;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            display: none;
            margin: 8px auto 0 auto;
            background: #fff;
        }

        /* 橫向排版屬性工具列 */
        .editor-tools {
            background: #fdfdfd;
            border: 1px solid var(--border-light);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .tool-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 11px;
        }
        .tool-item label {
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tool-item select, .tool-item input {
            padding: 7px 10px;
            background: #faf8f5;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }
        .tool-item select:focus, .tool-item input:focus {
            border-color: var(--primary);
            background: #ffffff;
        }

        /* 功能按鈕 */
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-primary { 
            background: var(--primary); 
            color: white; 
        }
        .btn-primary:hover { 
            background: var(--primary-hover); 
        }
        .btn-success { 
            background: var(--success); 
            color: white; 
        }
        .btn-success:hover { 
            background: var(--success-hover); 
        }
        .btn-trigger { 
            background: var(--warning); 
            color: white; 
            width: 100%; 
            margin-top: 5px; 
        }
        .btn-trigger:hover { 
            background: var(--warning-hover); 
        }
        .btn-demo { 
            background: #faf8f5; 
            color: var(--text-main); 
            padding: 6px 12px; 
            font-size: 11px; 
            margin-top: 5px; 
            border: 1px solid var(--border-light);
        }
        .btn-demo:hover { 
            background: var(--badge-bg);
            border-color: var(--border-hover);
        }

        /* AI 診斷日誌面板 */
        #diagnostic-log {
            background-color: #f7f5f0;
            border: 1px solid #e2dbd0;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-family: monospace, sans-serif;
            font-size: 11px;
            color: #5d635f;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            width: 100%;
            box-sizing: border-box;
        }
        .log-line {
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .log-line.info { color: #7d8f76; }
        .log-line.success { color: #588065; font-weight: bold; }
        .log-line.error { color: #db7c75; font-weight: bold; }
        .log-sub { padding-left: 12px; color: #8a928c; }

        /* 預覽 A4 畫布區 */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0 60px 0;
            overflow: auto;
            width: 100%;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
            transition: height 0.2s ease;
        }

        .a4-page {
            width: 210mm; 
            height: 297mm;
            background-color: #ffffff;
            box-shadow: 0 4px 25px rgba(115, 102, 92, 0.08);
            box-sizing: border-box;
            padding: 15mm; 
            display: grid;
            grid-template-columns: repeat(2, var(--card-width, 85.6mm)); 
            grid-template-rows: repeat(2, var(--card-height, 54mm));    
            gap: 0px; 
            justify-content: center;
            align-content: center;
            position: relative;
            page-break-after: always;
            transition: transform 0.2s ease;
            border: 1px solid var(--border-light);
        }

        /* 識別證卡片本體 */
        .id-card {
            box-sizing: border-box;
            position: relative;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            background-color: #faf9f6; 
            border: 1px dashed #e2dbd0; 
            width: 100%;
            height: 100%;
        }

        /* 裁切虛線樣式：使用淡淡的溫和灰線 */
        .has-crop-lines .id-card {
            outline: 1px dashed #d5cebf; 
            outline-offset: -1px;
        }

        /* 可拖曳與縮放的文字容器 */
        .text-layer {
            position: absolute;
            cursor: move;
            border: 1px dashed var(--warning); 
            box-sizing: border-box;
            padding: 2px 18px 2px 2px; 
            display: flex;
            align-items: center;
            overflow: visible; 
            background: rgba(212, 140, 112, 0.04);
        }
        .text-layer.selected {
            border: 1.5px dashed var(--primary) !important;
            background-color: rgba(125, 143, 118, 0.08);
        }
        
        /* 縮放點 */
        .resize-handle {
            width: 8px; height: 8px;
            background-color: var(--primary);
            position: absolute; right: 0; bottom: 0;
            cursor: se-resize;
            border-radius: 50%;
            z-index: 10;
            border: 1.5px solid white;
        }

        /* 刪除按鈕 */
        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 16px;
            height: 16px;
            background-color: var(--danger);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            z-index: 11;
            transition: all 0.2s ease;
        }
        .delete-btn:hover { 
            background-color: var(--danger-hover);
            transform: scale(1.1);
        }

        #ai-status { color: var(--primary); font-weight: bold; font-size: 12px; margin-left: 10px; }

        /* Zoom Slider Custom styling */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-light);
            border-radius: 4px;
            height: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Toast 提示框 */
        #toast {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1.5px solid var(--border-light);
            color: var(--text-main);
            padding: 12px 28px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(115, 102, 92, 0.12);
            display: none;
            z-index: 9999;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 列印樣式設定 */
        @media print {
            #control-panel { display: none !important; }
            body { background: none !important; }
            .preview-container { padding: 0 !important; }
            .text-layer { border: none !important; background: none !important; padding-right: 2px !important; }
            .resize-handle, .delete-btn { display: none !important; }
            .page-wrapper { margin: 0 !important; height: auto !important; }
            .a4-page { 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 15mm !important; 
                width: 210mm !important; 
                height: 297mm !important; 
                transform: none !important;
                border: none !important;
            }
            .id-card { border: none !important; background-color: transparent !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .has-crop-lines .id-card { outline: 1px dashed #cccccc !important; }
        }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div id="control-panel">
        <h2>🌿 2x2 智慧無縫識別證批量系統</h2>
        
        <div class="steps-grid">
            <!-- Step 1 -->
            <div class="step-card" id="card-step-1">
                <div class="step-header">
                    <span>Step 1. 輸入 Gemini Key</span>
                    <span class="step-badge">1</span>
                </div>
                <input type="password" id="gemini-key" placeholder="貼上金鑰（若在預覽中則免填）" oninput="validateSteps()">
                <div style="text-align: right; margin-top: 5px;">
                    <span class="step-status" id="status-1">未設定</span>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="step-card" id="card-step-2">
                <div class="step-header">
                    <span>Step 2. 上傳完稿圖</span>
                    <span class="step-badge">2</span>
                </div>
                <label for="upload-template" class="file-upload-label" id="label-template">選擇含範例文字圖</label>
                <input type="file" id="upload-template" accept="image/*" style="display: none;" onchange="handleTemplateUpload(this)">
                <img id="thumb-template" class="thumbnail-preview">
                <div style="text-align: right; margin-top: 5px;">
                    <span class="step-status" id="status-2">未上傳</span>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="step-card" id="card-step-3">
                <div class="step-header">
                    <span>Step 3. 上傳乾淨底圖</span>
                    <span class="step-badge">3</span>
                </div>
                <label for="upload-background" class="file-upload-label" id="label-background">選擇純背景底圖</label>
                <input type="file" id="upload-background" accept="image/*" style="display: none;" onchange="handleBackgroundUpload(this)">
                <img id="thumb-background" class="thumbnail-preview">
                <div style="text-align: right; margin-top: 5px;">
                    <span class="step-status" id="status-3">未上傳</span>
                </div>
            </div>

            <!-- Step 4 -->
            <div class="step-card" id="card-step-4">
                <div class="step-header">
                    <span>Step 4. Sheets CSV 網址</span>
                    <span class="step-badge">4</span>
                </div>
                <input type="text" id="sheet-url" placeholder="https://docs.google.com/..." oninput="validateSteps()">
                <div style="text-align: right; margin-top: 5px;">
                    <span class="step-status" id="status-4">未連結(可選)</span>
                </div>
            </div>

            <!-- Step 5 Button Wrapper -->
            <div class="step-card" style="background: rgba(212, 140, 112, 0.04); border-color: rgba(212, 140, 112, 0.2);">
                <div class="step-header" style="margin-bottom: 2px;">
                    <span style="font-weight: 800; color: var(--warning);">Step 5. 智慧一鍵執行</span>
                    <span class="step-badge" style="background: var(--warning); color: white; border-color: var(--warning);">5</span>
                </div>
                <button class="btn btn-trigger" onclick="runSmartLayout()">載入資料與 AI 排版</button>
                <button class="btn btn-demo" onclick="loadLocalDemo()">載入本機預設示範</button>
            </div>
        </div>

        <!-- 輔助屬性編輯器工具列 -->
        <div class="editor-tools">
            <div class="tool-item">
                <label>手動增建欄位</label>
                <div style="display: flex; gap: 4px;">
                    <input type="text" id="new-field-key" style="width: 85px;" placeholder="欄位名">
                    <button class="btn btn-primary" style="padding: 4px 10px; border-radius: 6px;" onclick="addNewField('', true)">＋</button>
                </div>
            </div>
            
            <!-- 即時動態尺寸調整欄位 -->
            <div class="tool-item" style="border-left: 1px solid var(--border-light); padding-left: 12px;">
                <label>卡片寬度 (cm)</label>
                <input type="number" id="card-width-input" value="8.56" step="0.05" min="3" max="20" style="width: 75px;" oninput="updateCardDimensions()">
            </div>
            <div class="tool-item">
                <label>卡片高度 (cm)</label>
                <input type="number" id="card-height-input" value="5.40" step="0.05" min="3" max="20" style="width: 75px;" oninput="updateCardDimensions()">
            </div>

            <div class="tool-item" style="border-left: 1px solid var(--border-light); padding-left: 12px;">
                <label>字型</label>
                <select id="font-family" onchange="updateSelectedStyle('fontFamily', this.value)">
                    <option value="'Microsoft JhengHei', sans-serif">微軟正黑體</option>
                    <option value="'PMingLiU', serif">新細明體</option>
                    <option value="Arial, sans-serif">Arial</option>
                </select>
            </div>
            <div class="tool-item">
                <label>字級 (px)</label>
                <input type="number" id="font-size" value="16" style="width: 55px;" oninput="updateSelectedStyle('fontSize', this.value + 'px')">
            </div>
            <div class="tool-item">
                <label>粗細</label>
                <select id="font-weight" onchange="updateSelectedStyle('fontWeight', this.value)">
                    <option value="normal">常規</option>
                    <option value="bold">粗體</option>
                </select>
            </div>
            <div class="tool-item">
                <label>字距</label>
                <input type="number" id="letter-spacing" value="0" style="width: 50px;" oninput="updateSelectedStyle('letterSpacing', this.value + 'px')">
            </div>
            <div class="tool-item">
                <label>行高</label>
                <input type="number" id="line-height" value="1.2" step="0.1" style="width: 50px;" oninput="updateSelectedStyle('lineHeight', this.value)">
            </div>
            <div class="tool-item">
                <label>顏色</label>
                <input type="color" id="font-color" onchange="updateSelectedStyle('color', this.value)" style="padding: 2px; width: 35px; height: 30px; cursor: pointer;">
            </div>
            <div class="tool-item">
                <label>對齊</label>
                <select id="text-align" onchange="updateSelectedStyle('justifyContent', this.value)">
                    <option value="flex-start">靠左</option>
                    <option value="center" selected>置中</option>
                    <option value="flex-end">靠右</option>
                </select>
            </div>
            <div class="tool-item" style="border-left: 1px solid var(--border-light); padding-left: 12px;">
                <label>預覽縮放</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="zoom-slider" min="0.3" max="1.5" step="0.05" value="0.7" style="width: 80px;" oninput="adjustZoom(this.value)">
                    <span id="zoom-val" style="font-size: 11px; font-weight: 800; color: var(--text-sub); width: 30px;">70%</span>
                </div>
            </div>
            <div class="tool-item" style="flex-direction: row; align-items: center; gap: 6px; margin-top: 15px;">
                <input type="checkbox" id="crop-lines-toggle" checked onchange="toggleCropLines()" style="cursor: pointer;">
                <label for="crop-lines-toggle" style="cursor: pointer;">裁切虛線</label>
            </div>
            
            <button class="btn btn-success" style="margin-left: auto;" onclick="window.print()">🖨️ 直接列印 PDF</button>
            <span id="ai-status"></span>
            <div id="dpi-msg" style="color: var(--primary); font-size: 11px; font-weight: 800;"></div>
        </div>

        <!-- AI 智慧校對日誌診斷面板 -->
        <div id="diagnostic-log"></div>
    </div>

    <!-- 畫布主容器 -->
    <div class="preview-container" id="pages-container"></div>

    <!-- Toast 提示框 -->
    <div id="toast"></div>

    <script>
        // Gemini API 專用全域金鑰變數。Preview 執行環境將在執行時自動為此欄注入可用金鑰。
        const apiKey = ""; 

        let currentBgUrl = ''; 
        let rawData = [];      
        let fieldsConfig = []; 
        let selectedKey = null; 
        
        let cardWidthMm = 85.6;  
        let cardHeightMm = 54; 
        
        let finishedDesignBase64 = ''; 
        let finishedDesignMime = '';

        window.onload = function() {
            loadDefaultSvgBackground();

            try {
                const savedAIKey = localStorage.getItem('saved_gemini_key');
                if (savedAIKey) {
                    document.getElementById('gemini-key').value = savedAIKey;
                }
                const savedUrl = localStorage.getItem('saved_sheet_url');
                if (savedUrl) {
                    document.getElementById('sheet-url').value = savedUrl;
                }
            } catch(e) {}
            validateSteps();
            syncSizeInputs();
            renderPages(); 
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            if (type === 'error') {
                toast.style.borderColor = 'var(--danger)';
                toast.style.backgroundColor = '#fffdfd';
            } else if (type === 'success') {
                toast.style.borderColor = 'var(--success)';
                toast.style.backgroundColor = '#fdfdfc';
            } else {
                toast.style.borderColor = 'var(--border-light)';
                toast.style.backgroundColor = '#ffffff';
            }
            toast.style.display = 'block';
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(-5px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(0)';
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 3000);

        // CSV 安全解析器
        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/);
            if (lines.length < 1) return { headers: [], data: [] };
            
            function splitLine(line) {
                let result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            }

            const headers = splitLine(lines[0]);
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = splitLine(lines[i]);
                if (cols.length >= headers.length) {
                    let rowObj = {};
                    headers.forEach((h, idx) => {
                        if (h) {
                            rowObj[h] = cols[idx] || '';
                        }
                    });
                    data.push(rowObj);
                }
            }
            return { headers, data };
        }

        // 呼叫 Gemini 專用退避重試函式 (不 log 重試過程，遇到 429 或網路中斷自動延遲再試)
        async function fetchGeminiWithRetry(activeKey, payload) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;
            let delay = 1000;
            let lastError = null;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                    lastError = new Error(`API 錯誤代碼: ${response.status}`);
                } catch (err) {
                    lastError = err;
                }
                if (i < 4) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
            throw lastError || new Error("請求失敗");
        }

        function updateSelectedStyle(property, value) {
            if (!selectedKey) return;
            const cfg = fieldsConfig.find(f => f.key === selectedKey);
            if (cfg) {
                cfg[property] = value;
                document.querySelectorAll(`.text-layer[data-key="${selectedKey}"]`).forEach(el => {
                    el.style[property] = value;
                });
            }
        }

        // 2x2 多頁自動分頁生成引擎
        function renderPages() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            const cardsPerPage = 4; // 2x2 版面配置
            
            let dataList = [];
            if (rawData.length > 0) {
                dataList = rawData;
            } else {
                let dummyRow = {};
                fieldsConfig.forEach(f => dummyRow[f.key] = `[${f.key}]`);
                dataList = Array(4).fill(dummyRow).map((row, idx) => {
                    let entry = {...row};
                    if (entry['姓名'] !== undefined) entry['姓名'] = `陳小明-${idx+1}`;
                    return entry;
                });
            }

            let currentPageEl = null;
            let currentWrapper = null;
            const currentZoom = parseFloat(document.getElementById('zoom-slider').value) || 0.7;

            dataList.forEach((item, index) => {
                if (index % cardsPerPage === 0) {
                    currentWrapper = document.createElement('div');
                    currentWrapper.className = 'page-wrapper';
                    currentWrapper.style.height = (297 * currentZoom + 5) + 'mm';

                    currentPageEl = document.createElement('div');
                    currentPageEl.className = 'a4-page';
                    
                    currentPageEl.style.transform = `scale(${currentZoom})`;
                    currentPageEl.style.transformOrigin = 'top center';

                    currentWrapper.appendChild(currentPageEl);
                    container.appendChild(currentWrapper);
                }

                const cardEl = document.createElement('div');
                cardEl.className = 'id-card';
                if (currentBgUrl) cardEl.style.backgroundImage = `url(${currentBgUrl})`;

                fieldsConfig.forEach(cfg => {
                    const layer = document.createElement('div');
                    layer.className = 'text-layer';
                    layer.dataset.key = cfg.key;
                    if (cfg.key === selectedKey) layer.classList.add('selected');

                    layer.style.top = cfg.top + '%';
                    layer.style.left = cfg.left + '%';
                    layer.style.width = cfg.width + '%';
                    layer.style.height = cfg.height + '%';
                    layer.style.fontFamily = cfg.fontFamily;
                    layer.style.fontSize = cfg.fontSize;
                    layer.style.fontWeight = cfg.fontWeight;
                    layer.style.letterSpacing = cfg.letterSpacing;
                    layer.style.lineHeight = cfg.lineHeight;
                    layer.style.color = cfg.color;
                    layer.style.justifyContent = cfg.justifyContent;
                    
                    layer.innerText = item[cfg.key] !== undefined ? item[cfg.key] : `[${cfg.key}]`;

                    // 僅第一張卡片的欄位提供可拖曳、拉伸大小的視覺化排版控制
                    if (index === 0) {
                        layer.addEventListener('mousedown', (e) => startDragOrResize(e, cfg, layer, cardEl));
                        
                        const handle = document.createElement('div');
                        handle.className = 'resize-handle';
                        layer.appendChild(handle);

                        const delBtn = document.createElement('div');
                        delBtn.className = 'delete-btn';
                        delBtn.innerText = '×';
                        delBtn.onclick = (e) => deleteField(cfg.key, e);
                        layer.appendChild(delBtn);
                    }

                    cardEl.appendChild(layer);
                });

                currentPageEl.appendChild(cardEl);
            });
            toggleCropLines(); 
        }

        function startDragOrResize(e, cfg, layer, cardEl) {
            if(e.target.classList.contains('delete-btn')) return;
            e.stopPropagation();
            selectField(cfg.key);

            const isResize = e.target.classList.contains('resize-handle');
            const cardRect = cardEl.getBoundingClientRect();
            
            const startX = e.clientX;
            const startY = e.clientY;
            const startLeft = (cfg.left / 100) * cardRect.width;
            const startTop = (cfg.top / 100) * cardRect.height;
            const startWidth = (cfg.width / 100) * cardRect.width;
            const startHeight = (cfg.height / 100) * cardRect.height;

            function onMouseMove(moveEvent) {
                const deltaX = moveEvent.clientX - startX;
                const deltaY = moveEvent.clientY - startY;

                if (isResize) {
                    const newWidthPct = ((startWidth + deltaX) / cardRect.width) * 100;
                    const newHeightPct = ((startHeight + deltaY) / cardRect.height) * 100;
                    cfg.width = Math.max(5, newWidthPct);
                    cfg.height = Math.max(2, newHeightPct);
                } else {
                    const newLeftPct = ((startLeft + deltaX) / cardRect.width) * 100;
                    const newTopPct = ((startTop + deltaY) / cardRect.height) * 100;
                    cfg.left = Math.max(0, Math.min(98, newLeftPct));
                    cfg.top = Math.max(0, Math.min(98, newTopPct));
                }

                document.querySelectorAll(`.text-layer[data-key="${cfg.key}"]`).forEach(el => {
                    el.style.left = cfg.left + '%';
                    el.style.top = cfg.top + '%';
                    el.style.width = cfg.width + '%';
                    el.style.height = cfg.height + '%';
                });
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }
    </script>
</body>
