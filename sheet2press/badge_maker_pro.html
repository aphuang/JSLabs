<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 自動化識別證排版系統 v0.3.2</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- PapaParse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f5f9;
    }
    /* A4 預覽樣式 */
    .a4-page {
      background: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05), 0 2px 5px rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .a4-portrait {
      width: 210mm;
      height: 297mm;
    }
    .a4-landscape {
      width: 297mm;
      height: 210mm;
    }
    /* 列印專用 CSS */
    @media print {
      body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      .no-print {
        display: none !important;
      }
      .a4-page {
        box-shadow: none !important;
        margin: 0 !important;
        page-break-after: always;
        border: none !important;
      }
      @page {
        margin: 0;
      }
    }
    /* 捲軸美化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

  <!-- 頂部導航列 -->
  <header class="no-print bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="bg-blue-600 text-white p-2 rounded-lg">
        <i data-lucide="contact-2" class="w-6 h-6"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-slate-900 flex items-center gap-2">
          AI 自動化識別證排版系統
          <span class="text-xs bg-blue-100 text-blue-700 font-semibold px-2 py-0.5 rounded-full">v0.3.2 經典穩定版</span>
        </h1>
        <p class="text-xs text-slate-500">純前端高效處理 • 支援拖曳排版 • A4 完美對齊直印</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2 transition shadow-sm">
        <i data-lucide="printer" class="w-4 h-4"></i>
        立即列印 (A4)
      </button>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="flex-1 flex overflow-hidden h-[calc(100vh-73px)]">
    
    <!-- 左側控制面板 (寬度 40%) -->
    <section class="no-print w-[420px] shrink-0 border-r border-slate-200 bg-white overflow-y-auto flex flex-col">
      
      <!-- 步驟 1: 置入底圖與名單 -->
      <div class="p-5 border-b border-slate-200">
        <div class="flex items-center gap-2 mb-4 text-blue-600">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs">1</span>
          <h2 class="font-bold text-slate-900">載入識別證底圖與資料</h2>
        </div>
        
        <!-- 底圖上傳 -->
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">選擇識別證底圖 (建議高解析度 JPG/PNG)</label>
          <div id="drop-zone" class="border-2 border-dashed border-slate-200 hover:border-blue-400 rounded-xl p-4 transition text-center cursor-pointer bg-slate-50">
            <input type="file" id="bg-upload" class="hidden" accept="image/*">
            <div id="upload-prompt" class="flex flex-col items-center gap-1">
              <i data-lucide="image" class="w-8 h-8 text-slate-400"></i>
              <span class="text-xs text-slate-500">拖曳圖片至此或點擊選取</span>
            </div>
            <div id="upload-success" class="hidden flex items-center justify-between gap-2 text-left bg-emerald-50 border border-emerald-200 p-2 rounded-lg">
              <div class="flex items-center gap-2 overflow-hidden">
                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-600 shrink-0"></i>
                <span id="bg-filename" class="text-xs text-emerald-800 font-medium truncate">底圖載入成功</span>
              </div>
              <button onclick="resetBg(event)" class="text-xs text-slate-400 hover:text-rose-600">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- CSV/名單上傳 -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">匯入人員名單 (CSV 格式)</label>
          <div class="flex gap-2">
            <input type="file" id="csv-upload" accept=".csv" class="hidden">
            <button onclick="document.getElementById('csv-upload').click()" class="flex-1 border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-xs font-medium flex items-center justify-center gap-1.5 transition">
              <i data-lucide="file-spreadsheet" class="w-4 h-4 text-emerald-600"></i>
              選擇 CSV 檔案
            </button>
            <button onclick="loadTemplateData()" class="border border-slate-300 hover:bg-slate-50 text-slate-500 px-3 py-2 rounded-lg text-xs font-medium transition">
              載入範例資料
            </button>
          </div>
          <div id="csv-status" class="mt-2 text-xs text-slate-500 hidden flex items-center gap-1">
            <i data-lucide="users" class="w-4 h-4"></i>
            <span>已成功載入 <strong id="csv-count" class="text-blue-600">0</strong> 筆名單資料</span>
          </div>
        </div>
      </div>

      <!-- 步驟 2: 文字區塊管理 -->
      <div class="p-5 border-b border-slate-200 flex-1">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2 text-blue-600">
            <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs">2</span>
            <h2 class="font-bold text-slate-900">文字區塊與欄位配置</h2>
          </div>
          <button onclick="addField()" class="text-blue-600 hover:text-blue-800 text-xs font-bold flex items-center gap-1">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>新增區塊
          </button>
        </div>

        <p class="text-xs text-slate-400 mb-4">提示：您可直接點擊右方預報欄位，在識別證畫面上直接「拖曳」定位 X, Y 軸！</p>

        <!-- 欄位列表 -->
        <div id="fields-container" class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
          <!-- 欄位卡片動態插入 -->
        </div>
      </div>

      <!-- 步驟 3: A4 版面設定 -->
      <div class="p-5 bg-slate-50">
        <div class="flex items-center gap-2 mb-4 text-blue-600">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs">3</span>
          <h2 class="font-bold text-slate-900">A4 紙張與列印版面設定</h2>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">紙張方向</label>
            <select id="layout-orientation" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 bg-white focus:ring-1 focus:ring-blue-500">
              <option value="portrait">直向 (Portrait)</option>
              <option value="landscape">橫向 (Landscape)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">裁切輔助線</label>
            <select id="layout-crop" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 bg-white focus:ring-1 focus:ring-blue-500">
              <option value="true">顯示裁切虛線</option>
              <option value="false">完全隱藏線條</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">橫向卡片數 (欄)</label>
            <input type="number" id="layout-cols" value="2" min="1" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">縱向卡片數 (列)</label>
            <input type="number" id="layout-rows" value="4" min="1" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 focus:ring-1 focus:ring-blue-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">邊界留白 (Margin, mm)</label>
            <input type="number" id="layout-margin" value="10" min="0" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">卡片間距 (Gap, mm)</label>
            <input type="number" id="layout-gap" value="2" min="0" onchange="updateLayout()" class="w-full text-xs border border-slate-300 rounded-lg p-2 focus:ring-1 focus:ring-blue-500">
          </div>
        </div>
      </div>

    </section>

    <!-- 右側雙預覽區 (畫布編輯與 A4 排版預覽) -->
    <section class="flex-1 flex flex-col bg-slate-100 overflow-hidden">
      
      <!-- 切換頁籤 -->
      <div class="no-print bg-white border-b border-slate-200 px-6 py-2.5 flex items-center justify-between">
        <div class="flex bg-slate-100 p-1 rounded-lg">
          <button id="tab-canvas" onclick="switchTab('canvas')" class="px-4 py-1.5 text-xs font-semibold rounded-md transition shadow-sm bg-white text-blue-600">
            <span class="flex items-center gap-1.5">
              <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>視覺拖曳設計
            </span>
          </button>
          <button id="tab-a4" onclick="switchTab('a4')" class="px-4 py-1.5 text-xs font-semibold rounded-md transition text-slate-600 hover:text-slate-900">
            <span class="flex items-center gap-1.5">
              <i data-lucide="grid" class="w-3.5 h-3.5"></i>A4 列印預覽 (共 <span id="page-count-badge">0</span> 頁)
            </span>
          </button>
        </div>
        <div class="text-xs text-slate-500">
          * 列印時請務必選擇 <strong class="text-blue-600">A4 紙張</strong>，並將邊界設為 <strong class="text-blue-600">無</strong> 或 <strong class="text-blue-600">預設</strong>。
        </div>
      </div>

      <!-- 視窗容器 -->
      <div class="flex-1 p-8 overflow-y-auto flex justify-center items-start">
        
        <!-- 畫籤 1: 視覺拖曳設計介面 -->
        <div id="view-canvas" class="w-full max-w-md bg-white rounded-2xl p-6 shadow-sm flex flex-col items-center gap-4">
          <div class="text-center">
            <h3 class="font-bold text-slate-800 text-sm">單張底圖文字定位</h3>
            <p class="text-xs text-slate-400 mt-1">選取欄位後，可直接在畫面上拖曳擺放或點擊編輯</p>
          </div>

          <!-- 視覺化畫布 -->
          <div id="design-canvas-container" class="relative w-[320px] h-[450px] bg-slate-100 rounded-xl border border-slate-200 overflow-hidden shadow-inner flex items-center justify-center">
            <!-- 底圖預覽 -->
            <img id="design-bg-img" src="" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none hidden">
            <div id="design-bg-placeholder" class="text-slate-400 text-center p-4">
              <i data-lucide="contact-2" class="w-12 h-12 mx-auto mb-2 opacity-40"></i>
              <p class="text-xs font-semibold">尚未載入底圖</p>
              <p class="text-[10px] opacity-75 mt-1">請在左側載入您的識別證底圖圖片</p>
            </div>
            
            <!-- 文字標籤容器 (拖曳核心) -->
            <div id="design-labels-overlay" class="absolute inset-0 select-none"></div>
          </div>

          <!-- 即時微調控制 -->
          <div class="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 grid grid-cols-2 gap-3 text-xs">
            <div>
              <span class="text-slate-500 font-medium">水平位置 (X):</span>
              <span id="coord-x" class="font-bold text-blue-600">50%</span>
            </div>
            <div>
              <span class="text-slate-500 font-medium">垂直位置 (Y):</span>
              <span id="coord-y" class="font-bold text-blue-600">50%</span>
            </div>
          </div>
        </div>

        <!-- 畫籤 2: A4 列印預覽 -->
        <div id="view-a4" class="hidden space-y-8">
          <!-- A4 紙張動態生成區 -->
          <div id="a4-pages-container" class="flex flex-col gap-8"></div>
        </div>

      </div>

    </section>

  </main>

  <script>
    // --- 系統資料狀態庫 (經典 0.3.2 結構) ---
    let bgImageData = ''; // 底圖 Data URL
    let bgFileName = '';
    let currentTab = 'canvas';
    let selectedFieldId = null; // 當前被選取進行拖曳/編輯的欄位 ID

    // 預設經典欄位設定
    let fields = [
      { id: 'field-1', key: '姓名', x: 50, y: 45, size: 28, color: '#1e293b', weight: 'bold', align: 'center', isCustom: false, customText: '', previewText: '陳小明' },
      { id: 'field-2', key: '部門', x: 50, y: 56, size: 16, color: '#475569', weight: 'normal', align: 'center', isCustom: false, customText: '', previewText: '設計工作流開發組' },
      { id: 'field-3', key: '職稱', x: 50, y: 62, size: 14, color: '#64748b', weight: 'normal', align: 'center', isCustom: false, customText: '', previewText: '資深落地師' },
      { id: 'field-4', key: '編號', x: 50, y: 22, size: 12, color: '#2563eb', weight: 'bold', align: 'center', isCustom: true, customText: 'VIP 通行證', previewText: 'VIP' }
    ];

    // 預設人員名單
    let people = [
      { '姓名': '陳小明', '部門': '設計工作流開發組', '職稱': '資深落地師' },
      { '姓名': '林美玲', '部門': '行銷推廣部', '職稱': '專案經理' },
      { '姓名': '張家豪', '部門': '技術研發部', '職稱': '後端工程師' },
      { '姓名': '黃靜怡', '部門': '人資行政部', '職稱': '行政專員' }
    ];

    // 初始化載入
    window.onload = function() {
      lucide.createIcons();
      initDragAndDrop();
      renderFieldsList();
      renderDesignCanvas();
      renderA4Preview();
      updateLayout();
    }

    // --- 畫籤控制與切換 ---
    function switchTab(tab) {
      currentTab = tab;
      
      const tabCanvas = document.getElementById('tab-canvas');
      const tabA4 = document.getElementById('tab-a4');
      const viewCanvas = document.getElementById('view-canvas');
      const viewA4 = document.getElementById('view-a4');

      if (tab === 'canvas') {
        tabCanvas.className = "px-4 py-1.5 text-xs font-semibold rounded-md transition shadow-sm bg-white text-blue-600";
        tabA4.className = "px-4 py-1.5 text-xs font-semibold rounded-md transition text-slate-600 hover:text-slate-900";
        viewCanvas.classList.remove('hidden');
        viewA4.classList.add('hidden');
      } else {
        tabCanvas.className = "px-4 py-1.5 text-xs font-semibold rounded-md transition text-slate-600 hover:text-slate-900";
        tabA4.className = "px-4 py-1.5 text-xs font-semibold rounded-md transition shadow-sm bg-white text-blue-600";
        viewCanvas.classList.add('hidden');
        viewA4.classList.remove('hidden');
        // 切換到 A4 預覽時即時更新
        renderA4Preview();
      }
    }

    // --- 圖片上傳與拖曳區設置 ---
    function initDragAndDrop() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('bg-upload');

      dropZone.addEventListener('click', () => {
        if (!bgImageData) fileInput.click();
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-50/50');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-blue-400', 'bg-blue-50/50');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50/50');
        if (e.dataTransfer.files.length > 0) {
          handleBgFile(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleBgFile(e.target.files[0]);
        }
      });

      // CSV 上傳監聽
      document.getElementById('csv-upload').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
          const file = e.target.files[0];
          Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              if (results.data && results.data.length > 0) {
                people = results.data;
                document.getElementById('csv-status').classList.remove('hidden');
                document.getElementById('csv-count').textContent = people.length;
                renderA4Preview();
              }
            }
          });
        }
      });
    }

    function handleBgFile(file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        bgImageData = event.target.result;
        bgFileName = file.name;
        
        document.getElementById('upload-prompt').classList.add('hidden');
        document.getElementById('upload-success').classList.remove('hidden');
        document.getElementById('bg-filename').textContent = file.name;

        // 更新視覺畫布底圖
        const designImg = document.getElementById('design-bg-img');
        designImg.src = bgImageData;
        designImg.classList.remove('hidden');
        document.getElementById('design-bg-placeholder').classList.add('hidden');

        renderA4Preview();
      };
      reader.readAsDataURL(file);
    }

    function resetBg(event) {
      event.stopPropagation();
      bgImageData = '';
      bgFileName = '';
      
      document.getElementById('bg-upload').value = '';
      document.getElementById('upload-prompt').classList.remove('hidden');
      document.getElementById('upload-success').classList.add('hidden');

      const designImg = document.getElementById('design-bg-img');
      designImg.src = '';
      designImg.classList.add('hidden');
      document.getElementById('design-bg-placeholder').classList.remove('hidden');

      renderA4Preview();
    }

    // --- 範例名單載入 ---
    function loadTemplateData() {
      people = [
        { '姓名': '王大同', '部門': '營運管理部', '職稱': '總監' },
        { '姓名': '李曉華', '部門': '創意研發部', '職稱': '藝術指導' },
        { '姓名': '林俊毅', '部門': '商務拓展組', '職稱': '拓展代表' },
        { '姓名': '周佩芬', '部門': '公共關係部', '職稱': '公關經理' },
        { '姓名': '吳冠宇', '部門': '數據分析組', '職稱': '工程師' },
        { '姓名': '徐詩涵', '部門': '視覺設計部', '職稱': '設計師' }
      ];
      document.getElementById('csv-status').classList.remove('hidden');
      document.getElementById('csv-count').textContent = people.length;
      renderA4Preview();
    }

    // --- 欄位控制與操作 ---
    function renderFieldsList() {
      const container = document.getElementById('fields-container');
      container.innerHTML = '';

      fields.forEach((field, index) => {
        const isSelected = field.id === selectedFieldId;
        const div = document.createElement('div');
        div.className = `border rounded-xl p-3 text-xs transition duration-200 ${isSelected ? 'border-blue-500 bg-blue-50/50 ring-1 ring-blue-500/20' : 'border-slate-200 hover:border-slate-300'}`;
        div.onclick = () => selectField(field.id);

        div.innerHTML = `
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-1.5 font-semibold text-slate-800">
              <span class="w-2 h-2 rounded-full" style="background-color: ${field.color}"></span>
              <input type="text" value="${field.key}" onchange="updateFieldKey('${field.id}', this.value)" class="bg-transparent font-bold border-b border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none w-20 py-0.5">
            </div>
            <div class="flex items-center gap-1">
              <button onclick="deleteField('${field.id}', event)" class="p-1 hover:text-rose-600 rounded">
                <i data-lucide="trash" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2 mt-1.5">
            <div>
              <span class="text-[10px] text-slate-400 block mb-0.5">對應類型</span>
              <select onchange="updateFieldType('${field.id}', this.value)" class="w-full text-[11px] p-1 border rounded bg-white">
                <option value="data" ${!field.isCustom ? 'selected' : ''}>名單對應</option>
                <option value="custom" ${field.isCustom ? 'selected' : ''}>自訂固定文字</option>
              </select>
            </div>
            <div>
              <span class="text-[10px] text-slate-400 block mb-0.5">${field.isCustom ? '自訂內文' : '預覽對照名稱'}</span>
              <input type="text" value="${field.isCustom ? field.customText : field.previewText}" 
                onchange="updateFieldText('${field.id}', this.value)" 
                class="w-full text-[11px] p-1 border rounded focus:ring-1 focus:ring-blue-500">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-1.5 mt-2 pt-2 border-t border-slate-100">
            <div>
              <span class="text-[10px] text-slate-400 block">大小 (px)</span>
              <input type="number" value="${field.size}" onchange="updateFieldStyle('${field.id}', 'size', this.value)" class="w-full text-[11px] p-1 border rounded">
            </div>
            <div>
              <span class="text-[10px] text-slate-400 block">顏色</span>
              <input type="color" value="${field.color}" onchange="updateFieldStyle('${field.id}', 'color', this.value)" class="w-full h-7 p-0.5 border rounded cursor-pointer">
            </div>
            <div>
              <span class="text-[10px] text-slate-400 block">對齊</span>
              <select onchange="updateFieldStyle('${field.id}', 'align', this.value)" class="w-full text-[11px] p-1 border rounded bg-white">
                <option value="left" ${field.align === 'left' ? 'selected' : ''}>靠左</option>
                <option value="center" ${field.align === 'center' ? 'selected' : ''}>置中</option>
                <option value="right" ${field.align === 'right' ? 'selected' : ''}>靠右</option>
              </select>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function selectField(id) {
      selectedFieldId = id;
      renderFieldsList();
      
      // 更新拖曳定位器的選取狀態
      const labels = document.querySelectorAll('.draggable-label');
      labels.forEach(lbl => {
        if (lbl.dataset.id === id) {
          lbl.classList.add('border-blue-500', 'ring-2', 'ring-blue-500/30', 'bg-blue-100/30');
          document.getElementById('coord-x').textContent = `${parseFloat(lbl.style.left).toFixed(1)}%`;
          document.getElementById('coord-y').textContent = `${parseFloat(lbl.style.top).toFixed(1)}%`;
        } else {
          lbl.classList.remove('border-blue-500', 'ring-2', 'ring-blue-500/30', 'bg-blue-100/30');
        }
      });
    }

    function addField() {
      const newId = `field-${Date.now()}`;
      fields.push({
        id: newId,
        key: '新欄位',
        x: 50,
        y: 50,
        size: 16,
        color: '#000000',
        weight: 'normal',
        align: 'center',
        isCustom: false,
        customText: '',
        previewText: '範例內容'
      });
      selectedFieldId = newId;
      renderFieldsList();
      renderDesignCanvas();
    }

    function deleteField(id, event) {
      if (event) event.stopPropagation();
      fields = fields.filter(f => f.id !== id);
      if (selectedFieldId === id) selectedFieldId = null;
      renderFieldsList();
      renderDesignCanvas();
      renderA4Preview();
    }

    function updateFieldKey(id, val) {
      const field = fields.find(f => f.id === id);
      if (field) {
        field.key = val;
        renderDesignCanvas();
        renderA4Preview();
      }
    }

    function updateFieldType(id, val) {
      const field = fields.find(f => f.id === id);
      if (field) {
        field.isCustom = (val === 'custom');
        renderFieldsList();
        renderDesignCanvas();
        renderA4Preview();
      }
    }

    function updateFieldText(id, val) {
      const field = fields.find(f => f.id === id);
      if (field) {
        if (field.isCustom) {
          field.customText = val;
        } else {
          field.previewText = val;
        }
        renderDesignCanvas();
        renderA4Preview();
      }
    }

    // 更新樣式 (大小、顏色、對齊等)
    function updateFieldStyle(id, prop, val) {
      const field = fields.find(f => f.id === id);
      if (field) {
        if (prop === 'size') field.size = parseInt(val) || 12;
        if (prop === 'color') field.color = val;
        if (prop === 'align') field.align = val;
        renderDesignCanvas();
        renderA4Preview();
      }
    }

    // --- 經典 0.3.2 拖曳畫布邏輯 (拖曳核心) ---
    function renderDesignCanvas() {
      const overlay = document.getElementById('design-labels-overlay');
      overlay.innerHTML = '';

      fields.forEach(field => {
        const label = document.createElement('div');
        label.dataset.id = field.id;
        label.className = `absolute draggable-label border border-dashed border-slate-300 rounded cursor-move px-2 py-1 select-none transition-shadow ${field.id === selectedFieldId ? 'border-blue-500 ring-2 ring-blue-500/30 bg-blue-100/30' : ''}`;
        
        // 設定絕對定位 (百分比)
        label.style.left = `${field.x}%`;
        label.style.top = `${field.y}%`;
        label.style.transform = 'translate(-50%, -50%)';
        
        // 設定內建字型樣式
        label.style.color = field.color;
        label.style.fontSize = `${field.size * 0.7}px`; // 視情況縮放
        label.style.fontWeight = field.weight === 'bold' ? '900' : 'normal';
        label.style.fontFamily = 'inherit';

        // 決定預覽呈現文字
        label.textContent = field.isCustom ? (field.customText || '[固定自訂]') : (field.previewText || `[${field.key}]`);

        // 綁定拖曳滑鼠事件
        label.addEventListener('mousedown', startDrag);
        // 觸控支援
        label.addEventListener('touchstart', startDrag, { passive: false });

        overlay.appendChild(label);
      });
    }

    function startDrag(e) {
      e.preventDefault();
      const label = e.currentTarget;
      const fieldId = label.dataset.id;
      selectField(fieldId);

      const isTouch = e.type.startsWith('touch');
      const startX = isTouch ? e.touches[0].clientX : e.clientX;
      const startY = isTouch ? e.touches[0].clientY : e.clientY;

      const container = document.getElementById('design-canvas-container');
      const rect = container.getBoundingClientRect();

      // 計算當前點擊相對於卡片內部的偏移量
      const labelRect = label.getBoundingClientRect();
      const offsetX = startX - (labelRect.left + labelRect.width / 2);
      const offsetY = startY - (labelRect.top + labelRect.height / 2);

      function doDrag(moveEvent) {
        const currentX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
        const currentY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;

        // 計算相對於容器的百分比位置
        let pctX = ((currentX - rect.left - offsetX) / rect.width) * 100;
        let pctY = ((currentY - rect.top - offsetY) / rect.height) * 100;

        // 限制在畫布之內
        pctX = Math.max(0, Math.min(100, pctX));
        pctY = Math.max(0, Math.min(100, pctY));

        // 更新狀態庫
        const field = fields.find(f => f.id === fieldId);
        if (field) {
          field.x = Math.round(pctX * 10) / 10;
          field.y = Math.round(pctY * 10) / 10;
          
          // 更新 DOM 樣式與微調座標顯示
          label.style.left = `${field.x}%`;
          label.style.top = `${field.y}%`;
          document.getElementById('coord-x').textContent = `${field.x.toFixed(1)}%`;
          document.getElementById('coord-y').textContent = `${field.y.toFixed(1)}%`;
        }
      }

      function stopDrag() {
        window.removeEventListener(isTouch ? 'touchmove' : 'mousemove', doDrag);
        window.removeEventListener(isTouch ? 'touchend' : 'mouseup', stopDrag);
        // 拖曳結束更新 A4 紙張
        renderA4Preview();
      }

      window.addEventListener(isTouch ? 'touchmove' : 'mousemove', doDrag, { passive: false });
      window.addEventListener(isTouch ? 'touchend' : 'mouseup', stopDrag);
    }

    // --- 版面配置與 A4 動態生成排版核心 ---
    function updateLayout() {
      renderA4Preview();
    }

    function renderA4Preview() {
      const container = document.getElementById('a4-pages-container');
      container.innerHTML = '';

      const orientation = document.getElementById('layout-orientation').value;
      const showCropLines = document.getElementById('layout-crop').value === 'true';
      const cols = parseInt(document.getElementById('layout-cols').value) || 2;
      const rows = parseInt(document.getElementById('layout-rows').value) || 4;
      const marginMm = parseFloat(document.getElementById('layout-margin').value) || 10;
      const gapMm = parseFloat(document.getElementById('layout-gap').value) || 2;

      const itemsPerPage = cols * rows;
      const pageCount = Math.max(1, Math.ceil(people.length / itemsPerPage));
      document.getElementById('page-count-badge').textContent = pageCount;

      // 生成每張 A4 頁面
      for (let p = 0; p < pageCount; p++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = `a4-page relative flex flex-col ${orientation === 'portrait' ? 'a4-portrait' : 'a4-landscape'}`;
        pageDiv.style.padding = `${marginMm}mm`;

        // 卡片網格容器
        const gridDiv = document.createElement('div');
        gridDiv.className = 'grid w-full h-full';
        gridDiv.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
        gridDiv.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;
        gridDiv.style.gap = `${gapMm}mm`;

        // 置入卡片
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const index = p * itemsPerPage + (r * cols + c);
            const person = people[index];

            const cardCell = document.createElement('div');
            cardCell.className = `relative w-full h-full rounded-sm overflow-hidden flex items-center justify-center bg-slate-50 border border-slate-100 ${showCropLines ? 'border-dashed border-slate-300 print:border-slate-300' : 'border-transparent'}`;

            if (person) {
              // 建立內嵌卡片結構
              if (bgImageData) {
                const bgImg = document.createElement('img');
                bgImg.src = bgImageData;
                bgImg.className = 'absolute inset-0 w-full h-full object-cover';
                cardCell.appendChild(bgImg);
              } else {
                cardCell.innerHTML = `<div class="absolute inset-0 flex items-center justify-center border border-dashed border-slate-300 text-slate-300 text-[10px]">尚未載入底圖</div>`;
              }

              // 建立文字覆蓋圖層
              const overlayDiv = document.createElement('div');
              overlayDiv.className = 'absolute inset-0';

              // 渲染各個欄位
              fields.forEach(field => {
                const txt = document.createElement('div');
                txt.className = 'absolute';
                txt.style.left = `${field.x}%`;
                txt.style.top = `${field.y}%`;
                txt.style.transform = 'translate(-50%, -50%)';
                
                txt.style.color = field.color;
                txt.style.fontSize = `${field.size}px`;
                txt.style.fontWeight = field.weight === 'bold' ? '900' : 'normal';
                txt.style.textAlign = field.align;
                txt.style.fontFamily = 'inherit';
                txt.style.whiteSpace = 'nowrap';

                // 計算動態對應值
                if (field.isCustom) {
                  txt.textContent = field.customText;
                } else {
                  txt.textContent = person[field.key] !== undefined ? person[field.key] : (person[field.previewText] || '');
                }

                overlayDiv.appendChild(txt);
              });

              cardCell.appendChild(overlayDiv);
            } else {
              // 空白填充格 (補齊 A4 排版網格對齊)
              cardCell.innerHTML = `<div class="text-[10px] text-slate-300 select-none">（空白格）</div>`;
            }

            gridDiv.appendChild(cardCell);
          }
        }

        pageDiv.appendChild(gridDiv);
        container.appendChild(pageDiv);
      }
    }
  </script>
